! Arabian Shield Linux Core — X11 Resource Overrides
! File: config/99-arabic-shield.conf
! Installed to: /etc/X11/Xresources.d/99-arabic-shield.conf
!
! These settings configure X11 font rendering and BiDi behavior
! at the display server level, affecting all X11 clients.

! ============================================================
! Xft (FreeType) rendering settings for Arabic
! ============================================================

! Enable antialiasing — essential for readable Arabic at all sizes
Xft.antialias:   1

! Enable hinting but use "slight" — heavy hinting distorts Arabic curves
Xft.hinting:     1
Xft.hintstyle:   hintslight

! Subpixel rendering — use "rgb" for most modern displays
! Change to "bgr" for some older Samsung/LG panels if colors look wrong
Xft.rgba:        rgb

! LCD filter — lcddefault balances sharpness and color fringing
Xft.lcdfilter:   lcddefault

! DPI — set explicitly to prevent GTK/Qt DPI mismatch that causes
! Arabic text to render at wrong size relative to UI elements
! Uncomment and adjust for your display:
! Xft.dpi:       96

! ============================================================
! GTK settings for Arabic
! ============================================================

! Use a font that has proper Arabic coverage as the default UI font
Gtk.font-name:   Noto Sans Arabic 10

! Enable input method for Arabic text entry
Gtk.im-module:   ibus

! ============================================================
! XIM (X Input Method) for Arabic keyboard input
! ============================================================
XIM.input_style:   OverTheSpot
