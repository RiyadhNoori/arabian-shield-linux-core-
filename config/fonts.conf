<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
    Arabian Shield Linux Core — Fontconfig Rules
    File: config/fonts.conf
    Installed to: /etc/fonts/conf.d/99-arabic-shield.conf

    Priority: 99 = highest override priority. This file runs last,
    ensuring Arabian Shield rules dominate over distro defaults.

    Purpose:
    1. Establish a correct Arabic font fallback chain
    2. Prevent Latin fonts from being used as Arabic fallbacks
    3. Enable proper ligature and kerning hints
    4. Configure hinting/antialiasing for Arabic script
-->
<fontconfig>

    <!-- ================================================================
         SECTION 1: Arabic Script — Font Priority Chain
         ================================================================
         Preferred order: Noto Naskh Arabic (modern, excellent coverage)
         → Amiri (classical, scholarly) → Scheherazade New (liturgical)
         → Cairo (geometric, UI-friendly) → system fallback
    -->

    <alias>
        <family>serif</family>
        <prefer>
            <family>Amiri</family>
            <family>Noto Naskh Arabic</family>
            <family>Scheherazade New</family>
            <family>DejaVu Serif</family>
        </prefer>
    </alias>

    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Sans Arabic</family>
            <family>Cairo</family>
            <family>Lateef</family>
            <family>DejaVu Sans</family>
        </prefer>
    </alias>

    <alias>
        <family>monospace</family>
        <prefer>
            <family>Noto Sans Arabic</family>
            <family>DejaVu Sans Mono</family>
        </prefer>
    </alias>

    <!-- ================================================================
         SECTION 2: Explicit Arabic Family Fallbacks
         Map common requested family names to Arabian Shield preferred fonts
    -->

    <!-- Arabic serif requests should use Amiri -->
    <match target="pattern">
        <test name="lang" compare="contains"><string>ar</string></test>
        <test name="family"><string>serif</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Amiri</string>
        </edit>
    </match>

    <!-- Arabic sans-serif requests should use Noto Sans Arabic -->
    <match target="pattern">
        <test name="lang" compare="contains"><string>ar</string></test>
        <test name="family"><string>sans-serif</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Sans Arabic</string>
        </edit>
    </match>

    <!-- Persian/Farsi uses Vazirmatn preferentially -->
    <match target="pattern">
        <test name="lang" compare="contains"><string>fa</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Vazirmatn</string>
            <string>Noto Sans Arabic</string>
        </edit>
    </match>

    <!-- Urdu — Nastaliq-aware fonts -->
    <match target="pattern">
        <test name="lang" compare="contains"><string>ur</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Nastaliq Urdu</string>
            <string>Jameel Noori Nastaleeq</string>
            <string>Noto Sans Arabic</string>
        </edit>
    </match>

    <!-- ================================================================
         SECTION 3: Block Latin fonts from Arabic codepoint fallback
         This prevents boxes from appearing when a Latin font is chosen
         for Arabic Unicode ranges U+0600–U+06FF, U+0750–U+077F, etc.
    -->

    <match target="scan">
        <test name="family"><string>DejaVu Sans</string></test>
        <edit name="charset" mode="assign">
            <!-- Remove Arabic Unicode block from DejaVu Sans charset
                 so Fontconfig falls through to a proper Arabic font -->
            <minus>
                <name>charset</name>
                <charset>
                    <range>
                        <int>0x0600</int><int>0x06FF</int>
                    </range>
                </charset>
            </minus>
        </edit>
    </match>

    <!-- ================================================================
         SECTION 4: Rendering Quality — Arabic-specific hinting rules
         Arabic script benefits from light hinting; heavy hinting
         distorts the organic letterform geometry.
    -->

    <match target="font">
        <test name="lang" compare="contains"><string>ar</string></test>
        <edit name="antialias" mode="assign"><bool>true</bool></edit>
        <edit name="hinting" mode="assign"><bool>true</bool></edit>
        <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
        <edit name="rgba" mode="assign"><const>rgb</const></edit>
        <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
        <edit name="autohint" mode="assign"><bool>false</bool></edit>
    </match>

    <!-- Apply same settings for Persian and Urdu -->
    <match target="font">
        <test name="lang" compare="contains"><string>fa</string></test>
        <edit name="antialias" mode="assign"><bool>true</bool></edit>
        <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
        <edit name="autohint" mode="assign"><bool>false</bool></edit>
    </match>

    <!-- ================================================================
         SECTION 5: Enable OpenType features for Arabic fonts
         kern: kerning, liga: standard ligatures (mandatory for Arabic),
         calt: contextual alternates (required for correct glyph selection)
    -->

    <match target="font">
        <test name="family" compare="contains"><string>Arabic</string></test>
        <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
    </match>

    <match target="font">
        <test name="family"><string>Amiri</string></test>
        <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
    </match>

    <!-- ================================================================
         SECTION 6: Size-specific overrides
         At small sizes (<12px), switch from Amiri to Noto for clarity
    -->

    <match target="pattern">
        <test name="lang" compare="contains"><string>ar</string></test>
        <test name="family"><string>serif</string></test>
        <test name="pixelsize" compare="less"><double>12</double></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Naskh Arabic</string>
        </edit>
    </match>

</fontconfig>
