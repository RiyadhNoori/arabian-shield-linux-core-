# Arabian Shield Linux Core — Locale Configuration Fragment
# File: config/locale.conf
#
# This file is NOT a replacement for /etc/locale.conf.
# The install script merges these settings into the existing
# locale configuration using locale-specific overrides.
#
# Arabic locale settings ensure correct:
# - Number formatting (Eastern Arabic numerals option)
# - Date/time formatting (Hijri calendar awareness)
# - Text collation (Unicode DUCET with Arabic tailoring)
# - Currency symbols
#
# Supported locales:
#   ar_AE  United Arab Emirates
#   ar_BH  Bahrain
#   ar_DZ  Algeria
#   ar_EG  Egypt
#   ar_IQ  Iraq
#   ar_JO  Jordan
#   ar_KW  Kuwait
#   ar_LB  Lebanon
#   ar_LY  Libya
#   ar_MA  Morocco
#   ar_OM  Oman
#   ar_QA  Qatar
#   ar_SA  Saudi Arabia
#   ar_SD  Sudan
#   ar_SY  Syria
#   ar_TN  Tunisia
#   ar_YE  Yemen
#   fa_IR  Iran (Persian)

# ── Core locale ────────────────────────────────────────────────
# Set to your preferred Arabic locale. ar_EG.UTF-8 is the most
# widely tested. Change to match your region.
LANG=ar_EG.UTF-8

# ── Category overrides ─────────────────────────────────────────
# Use UTF-8 for all text categories to ensure full Unicode support.

LC_CTYPE=ar_EG.UTF-8
LC_COLLATE=ar_EG.UTF-8
LC_MESSAGES=ar_EG.UTF-8

# Keep time/number in a neutral locale if you prefer Western
# digits and Gregorian calendar in terminals. Uncomment to use
# Arabic locale for these categories:
# LC_TIME=ar_EG.UTF-8
# LC_NUMERIC=ar_EG.UTF-8
# LC_MONETARY=ar_EG.UTF-8

# ── Paper size ─────────────────────────────────────────────────
# A4 is standard across the Arab world
LC_PAPER=ar_EG.UTF-8

# ── Address / telephone formatting ────────────────────────────
LC_ADDRESS=ar_EG.UTF-8
LC_TELEPHONE=ar_EG.UTF-8

# ── Measurement ────────────────────────────────────────────────
LC_MEASUREMENT=ar_EG.UTF-8

# ── Input method environment ───────────────────────────────────
# IBus is recommended for Arabic input on modern Linux desktops.
# Alternatively, use Fcitx5 with the Arabic keyboard module.
GTK_IM_MODULE=ibus
QT_IM_MODULE=ibus
XMODIFIERS=@im=ibus

# ── Pango rendering engine hint ───────────────────────────────
# Force Pango to use HarfBuzz for all text shaping.
# This is normally automatic in Pango >= 1.38 but explicit is safer.
PANGO_BACKEND=harfbuzz

# ── Right-to-Left environment hints ───────────────────────────
# Some applications read this to set initial text direction.
BIDI_CONTROL=ON
